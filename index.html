<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>祝您祕書節快樂！</title>
    
    <!-- Tailwind CSS 4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif+TC:wght@400;700&display=swap');

      :root {
        --font-serif: "Noto Serif TC", "Georgia", serif;
        --font-sans: "Inter", "Microsoft JhengHei", system-ui, sans-serif;
      }

      body {
        background-color: #f8f5f2;
        color: #4a4542;
        font-family: var(--font-serif);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      .font-sans { font-family: var(--font-sans); }
      .font-serif { font-family: var(--font-serif); }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      @keyframes spin-custom {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .spin-once {
        animation: spin-custom 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .fade-transition {
        transition: opacity 0.4s ease, transform 0.4s ease;
      }

      .fade-out {
        opacity: 0;
        transform: translateX(10px);
      }

      .fade-in {
        opacity: 1;
        transform: translateX(0);
      }

      button:active {
        transform: scale(0.96);
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-6 sm:p-12 selection:bg-[#d4a373]/30">
    
    <div 
      id="main-card"
      class="max-w-3xl w-full text-center relative z-10 bg-white/60 backdrop-blur-sm rounded-[40px] p-10 sm:p-20 shadow-2xl shadow-black/5 border border-[#d4a373]/20 overflow-hidden opacity-0 translate-y-5 transition-all duration-1000"
    >
      <!-- 飾品 Ornament -->
      <div class="absolute top-8 left-8 w-16 h-16 border-t-2 border-l-2 border-[#b08968] opacity-20 pointer-events-none"></div>
      <div class="absolute bottom-8 right-8 w-16 h-16 border-b-2 border-r-2 border-[#b08968] opacity-20 pointer-events-none"></div>

      <!-- 固定祝福語區塊 -->
      <header class="mb-12">
        <div class="inline-block p-2 mb-6 opacity-0 scale-90 transition-all duration-1000 delay-200" id="header-icon">
          <i data-lucide="sparkles" class="text-[#b08968] w-10 h-10 mx-auto"></i>
        </div>
        <h1 class="text-4xl sm:text-5xl font-bold text-[#b08968] mb-6 tracking-[2px]">
          祝您祕書節快樂！
        </h1>
        <p class="text-lg sm:text-xl text-[#7f5a48] leading-relaxed max-w-xl mx-auto px-4 italic font-medium opacity-90">
          感謝您這一年來的專業與辛勞，<br />
          您始終保持冷靜、高效且優雅，<br />
          是我們團隊運作中最不可或缺的核心力量。
        </p>
      </header>

      <!-- 隨機感謝文區塊 -->
      <div class="min-h-[220px] flex items-center justify-center mb-12">
        <div
          class="bg-white p-8 sm:p-12 rounded-2xl border-l-[6px] border-[#d4a373] shadow-lg shadow-[#b89076]/10 w-full max-w-lg mx-auto relative group animate-float"
        >
          <div class="absolute -top-4 -left-4 text-[#d4a373]/20">
            <i data-lucide="quote" class="w-10 h-10 fill-current"></i>
          </div>
          
          <div id="message-container" class="relative z-10 fade-transition fade-in">
            <p id="message-text" class="text-2xl sm:text-3xl font-medium text-[#5e503f] italic leading-relaxed">
              <!-- 初始文字將由 JS 填入 -->
            </p>
          </div>
        </div>
      </div>

      <!-- 互動按鈕 -->
      <button
        id="shuffle-btn"
        class="group flex items-center gap-3 px-10 py-4 bg-[#b08968] text-white rounded-full font-sans font-semibold tracking-wider shadow-xl shadow-[#b08968]/20 transition-all duration-300 mx-auto hover:bg-[#7f5a48] hover:scale-105"
      >
        <div id="refresh-icon-container">
          <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        </div>
        <span>再抽一張感言</span>
      </button>
      
      <footer class="mt-16 opacity-30 hover:opacity-100 transition-opacity duration-700">
        <div class="flex items-center justify-center gap-3 text-[#b08968] text-xs font-semibold uppercase tracking-[0.2em]">
          <i data-lucide="heart" class="w-3 h-3 fill-current"></i>
          <span>Dedicated Excellence</span>
          <i data-lucide="heart" class="w-3 h-3 fill-current"></i>
        </div>
      </footer>
    </div>

    <script>
      const GRATITUDE_MESSAGES = [
        "感謝您對每一個瑣碎細節的極致追求，讓團隊運作無後顧之憂。",
        "您的溝通能力如同潤滑劑，化解了無數潛在的矛盾與阻礙。",
        "高效率是您的代名詞，總能在緊湊的時間內精準完成各項任務。",
        "強大的組織能力讓繁雜的事務變得井然有序，提升了整體的效能。",
        "感謝您總是能預判需求，在問題發生前就做好萬全的準備。",
        "您的專業態度是我們學習的榜樣，更是團隊最穩定的核心力量。",
        "細心如您，總能發現報表中微小的錯誤，守護了我們的專業形象。",
        "無論工作多麼忙碌，您始終保持優雅與冷靜，帶給團隊安定的氛圍。",
        "感謝您的耐心傾聽與協調，讓跨部門合作變得如此順暢有效。",
        "您對行程的精準掌控，讓每一場會議與活動都能圓滿達成目標。",
        "正是因為有您的鼎力相助，我們才能專注於核心決策，創造更大價值。",
        "您的每一份貼心提醒，都是我們工作中不可或缺的溫暖動力。"
      ];

      let currentMessage = "";
      let isAnimating = false;

      const messageText = document.getElementById('message-text');
      const messageContainer = document.getElementById('message-container');
      const shuffleBtn = document.getElementById('shuffle-btn');
      const refreshIcon = document.getElementById('refresh-icon-container');

      function shuffleMessage() {
        if (isAnimating) return;
        isAnimating = true;

        // 圖標旋轉動畫
        refreshIcon.classList.remove('spin-once');
        void refreshIcon.offsetWidth; // Trigger reflow
        refreshIcon.classList.add('spin-once');

        // 文字更換動畫 (Fade out -> Change text -> Fade in)
        messageContainer.classList.remove('fade-in');
        messageContainer.classList.add('fade-out');

        setTimeout(() => {
          let randomIndex;
          do {
            randomIndex = Math.floor(Math.random() * GRATITUDE_MESSAGES.length);
          } while (GRATITUDE_MESSAGES[randomIndex] === currentMessage && GRATITUDE_MESSAGES.length > 1);

          currentMessage = GRATITUDE_MESSAGES[randomIndex];
          messageText.textContent = currentMessage;

          messageContainer.classList.remove('fade-out');
          messageContainer.classList.add('fade-in');
          
          setTimeout(() => {
            isAnimating = false;
          }, 400);
        }, 400);
      }

      // 初始化
      window.addEventListener('DOMContentLoaded', () => {
        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 卡片入場動畫
        const card = document.getElementById('main-card');
        const headerIcon = document.getElementById('header-icon');
        
        setTimeout(() => {
          card.classList.remove('opacity-0', 'translate-y-5');
          headerIcon.classList.remove('opacity-0', 'scale-90');
        }, 100);

        // 隨機選取第一句話
        const initialIndex = Math.floor(Math.random() * GRATITUDE_MESSAGES.length);
        currentMessage = GRATITUDE_MESSAGES[initialIndex];
        messageText.textContent = currentMessage;

        // 綁定點擊事件
        shuffleBtn.addEventListener('click', shuffleMessage);
      });
    </script>
  </body>
</html>
