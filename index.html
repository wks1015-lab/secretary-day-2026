<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>祝您祕書節快樂！</title>
    
    <style>
      /* 載入字體 - 使用系統字體優化離線體驗 */
      :root {
        --font-serif: "Noto Serif TC", "Songti TC", "STSong", "serif";
        --font-sans: "Inter", "Microsoft JhengHei", "PingFang TC", "sans-serif";
        --color-primary: #b08968;
        --color-secondary: #7f5a48;
        --color-accent: #d4a373;
        --color-bg: #f8f5f2;
        --color-text: #4a4542;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-serif);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      @media (min-width: 640px) {
        body { padding: 3rem; }
      }

      ::selection { 
        background-color: rgba(212, 163, 115, 0.3); 
      }

      #main-card {
        max-width: 48rem;
        width: 100%;
        text-align: center;
        position: relative;
        z-index: 10;
        background-color: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 40px;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1), 0 0 1px rgba(0,0,0,0.05);
        border: 1px solid rgba(212, 163, 115, 0.2);
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1s ease, transform 1s ease;
      }

      #main-card.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (min-width: 640px) {
        #main-card { padding: 5rem; }
      }

      .ornament {
        position: absolute;
        width: 4rem;
        height: 4rem;
        border-color: var(--color-primary);
        opacity: 0.2;
        pointer-events: none;
      }
      .top-left { top: 2rem; left: 2rem; border-top: 2px solid; border-left: 2px solid; }
      .bottom-right { bottom: 2rem; right: 2rem; border-bottom: 2px solid; border-right: 2px solid; }

      header { margin-bottom: 3rem; }
      
      #header-icon {
        display: inline-block;
        padding: 0.5rem;
        margin-bottom: 1.5rem;
        opacity: 0;
        transform: scale(0.9);
        transition: opacity 1s ease 0.2s, transform 1s ease 0.2s;
        color: var(--color-primary);
      }
      
      #header-icon.visible {
        opacity: 1;
        transform: scale(1);
      }

      h1 {
        font-size: 2.25rem;
        font-weight: 700;
        color: var(--color-primary);
        margin-bottom: 1.5rem;
        letter-spacing: 2px;
      }

      @media (min-width: 640px) {
        h1 { font-size: 3rem; }
      }

      .header-desc {
        font-size: 1.125rem;
        color: var(--color-secondary);
        line-height: 1.6;
        max-width: 36rem;
        margin: 0 auto;
        padding: 0 1rem;
        font-style: italic;
        font-weight: 500;
        opacity: 0.9;
      }

      @media (min-width: 640px) {
        .header-desc { font-size: 1.25rem; }
      }

      .message-section {
        min-height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 3rem;
      }

      .message-card {
        background-color: white;
        padding: 2rem;
        border-radius: 1rem;
        border-left: 6px solid var(--color-accent);
        box-shadow: 0 10px 15px -3px rgba(184, 144, 118, 0.1);
        width: 100%;
        max-width: 32rem;
        margin: 0 auto;
        position: relative;
      }

      @media (min-width: 640px) {
        .message-card { padding: 3rem; }
      }

      .quote-mark {
        position: absolute;
        top: -1rem;
        left: -1rem;
        color: rgba(212, 163, 115, 0.2);
        width: 2.5rem;
        height: 2.5rem;
      }

      #message-text {
        font-size: 1.5rem;
        font-weight: 500;
        color: #5e503f;
        font-style: italic;
        line-height: 1.6;
      }

      @media (min-width: 640px) {
        #message-text { font-size: 1.875rem; }
      }

      .fade-transition {
        transition: opacity 0.4s ease, transform 0.4s ease;
      }

      .fade-out {
        opacity: 0;
        transform: translateX(10px);
      }

      .fade-in {
        opacity: 1;
        transform: translateX(0);
      }

      #shuffle-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1rem 2.5rem;
        background-color: var(--color-primary);
        color: white;
        border-radius: 9999px;
        font-family: var(--font-sans);
        font-weight: 600;
        letter-spacing: 0.05em;
        box-shadow: 0 20px 25px -5px rgba(176, 137, 104, 0.2);
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 0 auto;
        user-select: none;
      }

      #shuffle-btn:hover {
        background-color: var(--color-secondary);
        transform: scale(1.05);
      }

      #shuffle-btn:active {
        transform: scale(0.96);
      }

      #shuffle-btn:disabled {
        background-color: #d1cfcd;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      @keyframes spin-custom {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .spin-once {
        animation: spin-custom 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
  </head>
  <body>
    
    <div id="main-card">
      <!-- 飾品 Ornament -->
      <div class="ornament top-left"></div>
      <div class="ornament bottom-right"></div>

      <!-- 固定祝福語區塊 -->
      <header>
        <div id="header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3m0 15v-3m9-9h-3M6 12H3m15.364 6.364l-2.121-2.121M7.757 7.757L5.636 5.636m12.728 0l-2.121 2.121M7.757 16.243l-2.121 2.121"/></svg>
        </div>
        <h1>BYE BYE BLUES!</h1>
        <p class="header-desc">
          今天，換我們把溫柔給妳。
        </p>
      </header>

      <!-- 隨機感謝文區塊 -->
      <div class="message-section">
        <div class="message-card animate-float">
          <div class="quote-mark">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1-.008-1-.008"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4-3 0-3 0-3 0v1c0 1-1 2-2 2s-1-.008-1-.008"/></svg>
          </div>
          
          <div id="message-container" class="fade-transition fade-in">
            <p id="message-text">
              <!-- 初始文字將由 JS 填入 -->
            </p>
          </div>
        </div>
      </div>

      <!-- 互動按鈕 -->
      <button id="shuffle-btn">
        <div id="refresh-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        </div>
        <span>再抽一張感言</span>
      </button>
    </div>

        "很多順利，不是理所當然。。",

      let drawCount = 1;
      const MAX_DRAWS = 100;

      const messageText = document.getElementById('message-text');
      const messageContainer = document.getElementById('message-container');
      const shuffleBtn = document.getElementById('shuffle-btn');
      const refreshIcon = document.getElementById('refresh-icon');

      function shuffleMessage() {
        if (isAnimating || drawCount >= MAX_DRAWS) return;
        
        drawCount++;
        isAnimating = true;

        // 圖標旋轉
        refreshIcon.classList.remove('spin-once');
        void refreshIcon.offsetWidth; 
        refreshIcon.classList.add('spin-once');

        // 文字更換動畫
        messageContainer.classList.remove('fade-in');
        messageContainer.classList.add('fade-out');

        setTimeout(() => {
          if (drawCount === MAX_DRAWS) {
            currentMessage = "恭喜抽滿100次！";
            messageText.textContent = currentMessage;
            triggerFireworks();
            shuffleBtn.disabled = true;
            shuffleBtn.querySelector('span').textContent = "抽卡次數已達上限";
          } else {
            let randomIndex;
            do {
              randomIndex = Math.floor(Math.random() * GRATITUDE_MESSAGES.length);
            } while (GRATITUDE_MESSAGES[randomIndex] === currentMessage && GRATITUDE_MESSAGES.length > 1);

            currentMessage = GRATITUDE_MESSAGES[randomIndex];
            messageText.textContent = currentMessage;
          }

          messageContainer.classList.remove('fade-out');
          messageContainer.classList.add('fade-in');
          
          setTimeout(() => {
            isAnimating = false;
          }, 400);
        }, 400);
      }

      function triggerFireworks() {
        const duration = 5 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

        function randomInRange(min, max) {
          return Math.random() * (max - min) + min;
        }

        const interval = setInterval(function() {
          const timeLeft = animationEnd - Date.now();

          if (timeLeft <= 0) {
            return clearInterval(interval);
          }

          const particleCount = 50 * (timeLeft / duration);
          confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
          confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);
      }

      // 初始化
      window.addEventListener('DOMContentLoaded', () => {
        const card = document.getElementById('main-card');
        const headerIcon = document.getElementById('header-icon');
        
        // 卡片入場
        setTimeout(() => {
          card.classList.add('visible');
          headerIcon.classList.add('visible');
        }, 100);

        // 初始文字
        const initialIndex = Math.floor(Math.random() * GRATITUDE_MESSAGES.length);
        currentMessage = GRATITUDE_MESSAGES[initialIndex];
        messageText.textContent = currentMessage;

        // 綁定事件
        shuffleBtn.addEventListener('click', shuffleMessage);
      });
    </script>
  </body>
</html>
