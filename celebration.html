<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝您祕書節快樂！</title>
    <!-- 使用 Tailwind CSS CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f5f5f0;
            color: #8c6b4d;
        }

        /* 自定義浮動動畫 */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .animate-float {
            animation: float 10s ease-in-out infinite;
        }

        .animate-float-delayed {
            animation: float 12s ease-in-out infinite;
            animation-delay: -5s;
        }

        /* 淡入動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-enter {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* 再抽一張按鈕的旋轉動畫 */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spin-once {
            animation: spin 0.5s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 selection:bg-[#eac8c1]">

    <!-- 背景裝飾物 -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
        <div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-[#eac8c1] rounded-full opacity-20 blur-3xl animate-float"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-[#b6916b] rounded-full opacity-10 blur-3xl animate-float-delayed"></div>
    </div>

    <main class="max-w-2xl w-full text-center fade-enter">
        <!-- 固定祝福語區塊 -->
        <header class="mb-12">
            <div class="inline-block mb-4 text-[#b6916b]">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            </div>
            <h1 class="text-4xl sm:text-5xl font-bold text-[#8c6b4d] mb-6 tracking-tight">祝您祕書節快樂！</h1>
            <p class="text-lg text-[#6b5a4d] leading-relaxed max-w-lg mx-auto opacity-90">
                感謝您這一年來的專業與辛勞，<br>
                您是團隊運作中最不可或缺的核心力量。
            </p>
        </header>

        <!-- 隨機感謝文區塊 -->
        <div class="bg-white/70 backdrop-blur-md rounded-3xl p-10 sm:p-14 shadow-xl shadow-[#8c6b4d]/5 border border-white/50 relative mb-10 transition-transform hover:-translate-y-1">
            <div class="absolute top-6 left-6 text-[#eac8c1]/30">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1 0 2.5 0 5-2 5"/><path d="M11 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c1 0 1 0 1 1 0 2.5 0 5-2 5"/></svg>
            </div>
            
            <div id="message-container" class="min-h-[100px] flex items-center justify-center px-4">
                <p id="gratitude-message" class="text-2xl sm:text-3xl font-medium text-[#8c6b4d] italic leading-snug fade-enter">
                    <!-- 載入中... -->
                </p>
            </div>

            <div class="absolute bottom-6 right-6 text-[#eac8c1]/30 transform rotate-180">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1 0 2.5 0 5-2 5"/><path d="M11 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c1 0 1 0 1 1 0 2.5 0 5-2 5"/></svg>
            </div>
        </div>

        <!-- 互動按鈕 -->
        <button id="shuffle-btn" class="flex items-center gap-3 px-8 py-4 bg-[#8c6b4d] text-white rounded-full font-semibold shadow-lg shadow-[#8c6b4d]/20 hover:bg-[#6b5a4d] active:scale-95 transition-all mx-auto focus:outline-none">
            <span id="btn-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
            </span>
            <span>再抽一張感言</span>
        </button>
        
        <footer class="mt-16 sm:mt-24 opacity-40 hover:opacity-100 transition-opacity">
            <div class="flex items-center justify-center gap-2 text-[#8c6b4d] text-sm font-medium uppercase tracking-widest">
                <span>Made with Love for You</span>
            </div>
        </footer>
    </main>

    <script>
        // 預設感謝文清單
        const GRATITUDE_MESSAGES = [
            "感謝您對每一個瑣碎細節的極致追求，讓團隊運作無後顧之憂。",
            "您的溝通能力如同潤滑劑，化解了無數潛在的矛盾與阻礙。",
            "高效率是您的代名詞，總能在緊湊的時間內精準完成各項任務。",
            "強大的組織能力讓繁雜的事務變得井有序，提升了整體的效能。",
            "感謝您總是能預判需求，在問題發生前就做好萬全的準備。",
            "您的專業態度是我們學習的榜樣，更是團隊最穩定的核心力量。",
            "細心如您，總能發現報表中微小的錯誤，守護了我們的專業形象。",
            "無論工作多麼忙碌，您始終保持優雅與冷靜，帶給團隊安定的氛圍。",
            "感謝您的耐心傾聽與協調，讓跨部門合作變得如此順暢有效。",
            "您對行程的精準掌控，讓每一場會議與活動都能圓滿達成目標。",
            "正是因為有您的鼎力相助，我們才能專注於核心決策，創造更大價值。",
            "您的每一份貼心提醒，都是我們工作中不可或缺的溫暖動力。"
        ];

        let currentMessage = "";

        const msgElement = document.getElementById('gratitude-message');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const btnIcon = document.getElementById('btn-icon');

        function shuffleMessage() {
            // 按鈕旋轉動畫
            btnIcon.classList.remove('spin-once');
            void btnIcon.offsetWidth; // 強制重繪以觸發動畫
            btnIcon.classList.add('spin-once');

            // 隨機選取，且不與上次重複
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * GRATITUDE_MESSAGES.length);
            } while (GRATITUDE_MESSAGES[randomIndex] === currentMessage && GRATITUDE_MESSAGES.length > 1);

            currentMessage = GRATITUDE_MESSAGES[randomIndex];

            // 文字更換動畫
            msgElement.style.opacity = '0';
            setTimeout(() => {
                msgElement.textContent = currentMessage;
                msgElement.style.opacity = '1';
                msgElement.classList.remove('fade-enter');
                void msgElement.offsetWidth;
                msgElement.classList.add('fade-enter');
            }, 200);
        }

        // 初始執行
        shuffleBtn.addEventListener('click', shuffleMessage);
        window.onload = shuffleMessage;
    </script>
</body>
</html>
